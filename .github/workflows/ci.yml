name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & test each Python service ─────────────────────────────────────────
  test-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, auth, users, search, tokens, vendors]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r services/${{ matrix.service }}/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -d "tests" ]; then pytest tests/ -v; else echo "No tests yet — skipping"; fi

  # ── Build Docker images ──────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test-services
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [gateway, auth, users, search, tokens, vendors, worker, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/localmate-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/localmate-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to AWS (ECS) ──────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Force ECS service update (rolling deploy)
        run: |
          for svc in gateway auth users search tokens vendors worker frontend; do
            aws ecs update-service \
              --cluster localmate-cluster \
              --service localmate-${svc} \
              --force-new-deployment \
              --region ${{ secrets.AWS_REGION }} || echo "Service ${svc} not found — skipping"
          done
