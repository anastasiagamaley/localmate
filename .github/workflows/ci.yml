name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth, users, tokens, gigs, gateway]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt
      - name: Install deps + test tools
        run: |
          pip install -r services/${{ matrix.service }}/requirements.txt
          pip install pytest pytest-asyncio anyio httpx
      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: pytest tests/ -v --tb=short

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            context: .
            dockerfile: services/gateway/Dockerfile
          - service: auth
            context: .
            dockerfile: services/auth/Dockerfile
          - service: users
            context: .
            dockerfile: services/users/Dockerfile
          - service: search
            context: .
            dockerfile: services/search/Dockerfile
          - service: tokens
            context: .
            dockerfile: services/tokens/Dockerfile
          - service: vendors
            context: .
            dockerfile: services/vendors/Dockerfile
          - service: gigs
            context: .
            dockerfile: services/gigs/Dockerfile
          - service: worker
            context: .
            dockerfile: services/worker/Dockerfile
          - service: frontend
            context: services/frontend
            dockerfile: services/frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/localmate-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/localmate-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Deploy to ECS
        run: |
          for svc in gateway auth users search tokens vendors gigs worker frontend; do
            aws ecs update-service \
              --cluster localmate-cluster \
              --service localmate-${svc} \
              --force-new-deployment \
              --region ${{ secrets.AWS_REGION }} || echo "Skipping ${svc}"
          done
